<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Omnichannel Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/dashboard.css">
    
    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel CDN for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        Babel.registerPreset("custom-react", {
            presets: [
                [Babel.availablePresets["react"], { runtime: "classic" }],
                Babel.availablePresets["es2015"]
            ]
        });
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect, useRef } = React;

        const useApi = (url, options = {}) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            const fetchData = () => {
                if (!url) {
                    setLoading(false);
                    return;
                }
                setLoading(true);
                fetch(url, options)
                    .then(res => res.json())
                    .then(resData => {
                        setData(resData);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            };

            useEffect(() => {
                fetchData();
            }, [url]);

            return { data, loading, setData, refetch: fetchData };
        };

        const OverviewView = () => {
    const { data: stats, loading, refetch } = useApi('/api/analytics');

    useEffect(() => {
        const interval = setInterval(() => {
            refetch();
        }, 5000);
        return () => clearInterval(interval);
    }, []);

    useEffect(() => {
        if (window.lucide) {
            window.lucide.createIcons();
        }
    }, [stats, loading]);

    if (loading && !stats) {
        return (
            <div className="main-content" style={{display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: 'var(--text-muted)'}}>
                Loading dashboard metrics...
            </div>
        );
    }

    const { 
        total_conversations = 0, 
        total_messages = 0, 
        by_channel = {}, 
        by_status = {},
        avg_lead_time_ai = 0,
        avg_lead_time_manual = 0,
        kpi_lead_time_ai = 15,
        kpi_lead_time_manual = 300
    } = stats || {};

    const platforms = [
        { name: 'Telegram', icon: 'send', color: '#3b82f6', bg: 'rgba(59, 130, 246, 0.1)' },
        { name: 'WhatsApp', icon: 'phone', color: '#10b981', bg: 'rgba(16, 185, 129, 0.1)' },
        { name: 'Shopee', icon: 'shopping-bag', color: '#f97316', bg: 'rgba(249, 115, 22, 0.1)' },
        { name: 'TikTok', icon: 'video', color: '#ec4899', bg: 'rgba(236, 72, 153, 0.1)' },
        { name: 'Tokopedia', icon: 'grid', color: '#22c55e', bg: 'rgba(34, 197, 94, 0.1)' }
    ];

    const statuses = [
        { key: 'waiting_admin', label: 'Waiting Admin', color: '#fbbf24', bg: 'rgba(245, 158, 11, 0.15)' },
        { key: 'waiting_customer', label: 'Waiting Customer', color: '#34d399', bg: 'rgba(16, 185, 129, 0.15)' },
        { key: 'closed', label: 'Closed', color: '#f87171', bg: 'rgba(239, 68, 68, 0.15)' }
    ];

    return (
        <div className="main-content" style={{overflowY: 'auto', height: '100vh'}}>
            <div className="page-header" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                <span>Dashboard Overview</span>
                <button className="btn" style={{padding: '0.4rem 1rem', fontSize: '0.8rem', display: 'flex', alignItems: 'center', gap: '0.35rem'}} onClick={() => refetch()}>
                    <i data-lucide="refresh-cw" style={{width: 14, height: 14}}></i> Refresh
                </button>
            </div>

            <div style={{padding: '2rem', display: 'flex', flexDirection: 'column', gap: '2rem', maxWidth: '1200px'}}>
                {/* Metric Cards Row */}
                <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '1.25rem'}}>
                    {/* Card 1: Total Conversations */}
                    <div className="card" style={{
                        marginBottom: 0,
                        position: 'relative',
                        overflow: 'hidden',
                        background: 'linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(139, 92, 246, 0.05) 100%)',
                        border: '1px solid rgba(59, 130, 246, 0.2)',
                        padding: '1.25rem'
                    }}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <div>
                                <div style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontWeight: 500}}>Total Incoming Chats</div>
                                <div style={{fontSize: '2.2rem', fontWeight: 700, color: 'white', marginTop: '0.25rem'}}>{total_conversations}</div>
                            </div>
                            <div style={{
                                width: 44,
                                height: 44,
                                borderRadius: '0.75rem',
                                background: 'rgba(59, 130, 246, 0.2)',
                                display: 'flex',
                                alignItems: 'center',
                                justify: 'center',
                                color: '#60a5fa'
                            }}>
                                <i data-lucide="message-square" style={{width: 22, height: 22}}></i>
                            </div>
                        </div>
                        <div style={{fontSize: '0.7rem', color: 'var(--text-muted)', marginTop: '0.75rem'}}>
                            Across all platform integrations
                        </div>
                    </div>

                    {/* Card 2: Total Messages */}
                    <div className="card" style={{
                        marginBottom: 0,
                        position: 'relative',
                        overflow: 'hidden',
                        background: 'linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(139, 92, 246, 0.05) 100%)',
                        border: '1px solid rgba(16, 185, 129, 0.2)',
                        padding: '1.25rem'
                    }}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <div>
                                <div style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontWeight: 500}}>Total Messages</div>
                                <div style={{fontSize: '2.2rem', fontWeight: 700, color: 'white', marginTop: '0.25rem'}}>{total_messages}</div>
                            </div>
                            <div style={{
                                width: 44,
                                height: 44,
                                borderRadius: '0.75rem',
                                background: 'rgba(16, 185, 129, 0.2)',
                                display: 'flex',
                                alignItems: 'center',
                                justify: 'center',
                                color: '#34d399'
                            }}>
                                <i data-lucide="database" style={{width: 22, height: 22}}></i>
                            </div>
                        </div>
                        <div style={{fontSize: '0.7rem', color: 'var(--text-muted)', marginTop: '0.75rem'}}>
                            Incoming & outgoing message count
                        </div>
                    </div>

                    {/* Card 3: AI Lead Time */}
                    <div className="card" style={{
                        marginBottom: 0,
                        position: 'relative',
                        overflow: 'hidden',
                        background: 'linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(59, 130, 246, 0.05) 100%)',
                        border: '1px solid rgba(139, 92, 246, 0.2)',
                        padding: '1.25rem'
                    }}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <div>
                                <div style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontWeight: 500}}>Avg AI Lead Time</div>
                                <div style={{fontSize: '2.2rem', fontWeight: 700, color: 'white', marginTop: '0.25rem'}}>
                                    {avg_lead_time_ai > 0 ? `${avg_lead_time_ai}s` : 'N/A'}
                                </div>
                            </div>
                            <div style={{
                                width: 44,
                                height: 44,
                                borderRadius: '0.75rem',
                                background: 'rgba(139, 92, 246, 0.2)',
                                display: 'flex',
                                alignItems: 'center',
                                justify: 'center',
                                color: '#a78bfa'
                            }}>
                                <i data-lucide="bot" style={{width: 22, height: 22}}></i>
                            </div>
                        </div>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '0.75rem', fontSize: '0.7rem'}}>
                            <span style={{color: 'var(--text-muted)'}}>Target KPI: {kpi_lead_time_ai}s</span>
                            {avg_lead_time_ai === 0 ? (
                                <span style={{color: 'var(--text-muted)'}}>No Data</span>
                            ) : avg_lead_time_ai <= kpi_lead_time_ai ? (
                                <span style={{color: '#34d399', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '2px'}}>
                                    <i data-lucide="check" style={{width: 10, height: 10}}></i> On Target
                                </span>
                            ) : (
                                <span style={{color: '#f87171', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '2px'}}>
                                    <i data-lucide="alert-triangle" style={{width: 10, height: 10}}></i> Over KPI
                                </span>
                            )}
                        </div>
                    </div>

                    {/* Card 4: Manual CS Lead Time */}
                    <div className="card" style={{
                        marginBottom: 0,
                        position: 'relative',
                        overflow: 'hidden',
                        background: 'linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(139, 92, 246, 0.05) 100%)',
                        border: '1px solid rgba(245, 158, 11, 0.2)',
                        padding: '1.25rem'
                    }}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <div>
                                <div style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontWeight: 500}}>Avg Manual Lead Time</div>
                                <div style={{fontSize: '2.2rem', fontWeight: 700, color: 'white', marginTop: '0.25rem'}}>
                                    {avg_lead_time_manual > 0 ? `${avg_lead_time_manual}s` : 'N/A'}
                                </div>
                            </div>
                            <div style={{
                                width: 44,
                                height: 44,
                                borderRadius: '0.75rem',
                                background: 'rgba(245, 158, 11, 0.2)',
                                display: 'flex',
                                alignItems: 'center',
                                justify: 'center',
                                color: '#fbbf24'
                            }}>
                                <i data-lucide="user" style={{width: 22, height: 22}}></i>
                            </div>
                        </div>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '0.75rem', fontSize: '0.7rem'}}>
                            <span style={{color: 'var(--text-muted)'}}>Target KPI: {kpi_lead_time_manual}s</span>
                            {avg_lead_time_manual === 0 ? (
                                <span style={{color: 'var(--text-muted)'}}>No Data</span>
                            ) : avg_lead_time_manual <= kpi_lead_time_manual ? (
                                <span style={{color: '#34d399', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '2px'}}>
                                    <i data-lucide="check" style={{width: 10, height: 10}}></i> On Target
                                </span>
                            ) : (
                                <span style={{color: '#f87171', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '2px'}}>
                                    <i data-lucide="alert-triangle" style={{width: 10, height: 10}}></i> Over KPI
                                </span>
                            )}
                        </div>
                    </div>
                </div>

                {/* Platform & Status Breakdown Grid */}
                <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(450px, 1fr))', gap: '2rem'}}>
                    {/* Platform Breakdown */}
                    <div className="card" style={{marginBottom: 0}}>
                        <div className="card-title" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <span>Platform Breakdown</span>
                            <span style={{fontSize: '0.75rem', color: 'var(--text-muted)', fontWeight: 'normal'}}>Chats per integration</span>
                        </div>
                        <div style={{display: 'flex', flexDirection: 'column', gap: '1.25rem'}}>
                            {platforms.map(platform => {
                                const count = by_channel[platform.name] || 0;
                                const percentage = total_conversations > 0 ? (count / total_conversations) * 100 : 0;
                                return (
                                    <div key={platform.name} style={{display: 'flex', flexDirection: 'column', gap: '0.5rem'}}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                            <div style={{display: 'flex', alignItems: 'center', gap: '0.75rem'}}>
                                                <div style={{
                                                    width: 36,
                                                    height: 36,
                                                    borderRadius: '0.5rem',
                                                    background: platform.bg,
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justify: 'center',
                                                    color: platform.color
                                                }}>
                                                    <i data-lucide={platform.icon} style={{width: 18, height: 18}}></i>
                                                </div>
                                                <span style={{fontWeight: 600, color: 'white'}}>{platform.name}</span>
                                            </div>
                                            <div style={{textAlign: 'right'}}>
                                                <span style={{fontWeight: 700, color: 'white', fontSize: '1.1rem'}}>{count}</span>
                                                <span style={{fontSize: '0.75rem', color: 'var(--text-muted)', marginLeft: '0.5rem'}}>({percentage.toFixed(0)}%)</span>
                                            </div>
                                        </div>
                                        <div style={{width: '100%', height: 6, background: 'rgba(255,255,255,0.05)', borderRadius: 3, overflow: 'hidden'}}>
                                            <div style={{width: `${percentage}%`, height: '100%', background: platform.color, borderRadius: 3, transition: 'width 0.5s ease-out-in'}}></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Status Distribution */}
                    <div className="card" style={{marginBottom: 0}}>
                        <div className="card-title" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <span>Status Distribution</span>
                            <span style={{fontSize: '0.75rem', color: 'var(--text-muted)', fontWeight: 'normal'}}>Inbox state tracking</span>
                        </div>
                        <div style={{display: 'flex', flexDirection: 'column', gap: '1.5rem', justifyContent: 'center', height: '100%', paddingBottom: '1rem'}}>
                            {statuses.map(st => {
                                const count = by_status[st.key] || 0;
                                const percentage = total_conversations > 0 ? (count / total_conversations) * 100 : 0;
                                return (
                                    <div key={st.key} style={{
                                        padding: '1.25rem',
                                        background: 'rgba(255,255,255,0.02)',
                                        borderRadius: '0.75rem',
                                        border: '1px solid var(--border-color)',
                                        display: 'flex',
                                        justifyContent: 'space-between',
                                        alignItems: 'center'
                                    }}>
                                        <div style={{display: 'flex', alignItems: 'center', gap: '0.75rem'}}>
                                            <div style={{
                                                width: 10,
                                                height: 10,
                                                borderRadius: '50%',
                                                background: st.color,
                                                boxShadow: `0 0 10px ${st.color}`
                                            }}></div>
                                            <span style={{fontWeight: 600, color: 'white'}}>{st.label}</span>
                                        </div>
                                        <div style={{textAlign: 'right', display: 'flex', alignItems: 'baseline', gap: '0.35rem'}}>
                                            <span style={{fontWeight: 700, color: st.color, fontSize: '1.5rem'}}>{count}</span>
                                            <span style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>chats</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
};
        const SettingsView = () => {
    const [activeTab, setActiveTab] = useState('master');
    
    // Knowledge Base state
    const { data: kbData, refetch: refetchKb } = useApi('/api/knowledge-base');
    const [kbForm, setKbForm] = useState({ category: 'Company Profile', title: '', content: '' });

    // Products state
    const [masterSubTab, setMasterSubTab] = useState('kb');
    const { data: productsData, refetch: refetchProducts } = useApi('/api/products');
    const [productForm, setProductForm] = useState({
        id: null,
        name: '',
        price: '',
        stock: '',
        external_product_id: '',
        compatibilities: [{ brand: '', model: '', year: '' }]
    });
    const [importing, setImporting] = useState(false);
    const [selectedFile, setSelectedFile] = useState(null);

    const handleFileChange = (e) => {
        if (e.target.files && e.target.files.length > 0) {
            setSelectedFile(e.target.files[0]);
        } else {
            setSelectedFile(null);
        }
    };

    const importCsv = () => {
        if (!selectedFile) {
            alert('Please select a CSV file first.');
            return;
        }
        setImporting(true);
        const formData = new FormData();
        formData.append('file', selectedFile);

        fetch('/api/products/import', {
            method: 'POST',
            body: formData
        })
        .then(res => {
            if (!res.ok) {
                return res.json().then(data => {
                    throw new Error(data.message || 'Import failed.');
                });
            }
            return res.json();
        })
        .then(data => {
            setImporting(false);
            setSelectedFile(null);
            refetchProducts();
            alert(data.message || 'Products imported successfully!');
        })
        .catch(err => {
            setImporting(false);
            console.error(err);
            alert(`Failed to import products: ${err.message}`);
        });
    };

    const handleCompatibilityChange = (index, field, value) => {
        const newCompatibilities = [...productForm.compatibilities];
        newCompatibilities[index][field] = value;
        setProductForm({ ...productForm, compatibilities: newCompatibilities });
    };

    const addCompatibilityRow = () => {
        setProductForm({
            ...productForm,
            compatibilities: [...productForm.compatibilities, { brand: '', model: '', year: '' }]
        });
    };

    const removeCompatibilityRow = (index) => {
        const newCompatibilities = productForm.compatibilities.filter((_, i) => i !== index);
        setProductForm({ ...productForm, compatibilities: newCompatibilities });
    };

    const saveProduct = () => {
        if (!productForm.name || !productForm.price || !productForm.stock) {
            alert('Name, Price, and Stock are required.');
            return;
        }
        const method = productForm.id ? 'PUT' : 'POST';
        const url = productForm.id ? `/api/products/${productForm.id}` : '/api/products';
        
        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(productForm)
        })
        .then(res => res.json())
        .then(() => {
            setProductForm({
                id: null,
                name: '',
                price: '',
                stock: '',
                external_product_id: '',
                compatibilities: [{ brand: '', model: '', year: '' }]
            });
            refetchProducts();
            alert('Product saved successfully!');
        })
        .catch(err => {
            console.error(err);
            alert('Failed to save product.');
        });
    };

    const editProduct = (prod) => {
        setProductForm({
            id: prod.id,
            name: prod.name,
            price: prod.price,
            stock: prod.stock,
            external_product_id: prod.external_product_id || '',
            compatibilities: prod.product_compatibilities && prod.product_compatibilities.length > 0
                ? prod.product_compatibilities.map(c => ({ brand: c.vehicle_brand || '', model: c.vehicle_model || '', year: c.vehicle_year || '' }))
                : [{ brand: '', model: '', year: '' }]
        });
    };

    const deleteProduct = (id) => {
        if (!confirm('Are you sure you want to delete this product?')) return;
        fetch(`/api/products/${id}`, {
            method: 'DELETE'
        })
        .then(() => {
            refetchProducts();
            alert('Product deleted successfully!');
        })
        .catch(err => {
            console.error(err);
            alert('Failed to delete product.');
        });
    };

    // Channels & AI Settings state
    const { data: settingsData, refetch: refetchSettings } = useApi('/api/settings');

    // Telegram state
    const [botToken, setBotToken] = useState('');
    const [botUsername, setBotUsername] = useState('');

    // OpenAI state
    const [openAiToken, setOpenAiToken] = useState('');

    // AI Personality & Briefing state
    const [personality, setPersonality] = useState('');
    const [briefing, setBriefing] = useState('');
    const [kpiLeadTimeAi, setKpiLeadTimeAi] = useState(15);
    const [kpiLeadTimeManual, setKpiLeadTimeManual] = useState(300);

    useEffect(() => {
        lucide.createIcons();
    }, [activeTab, kbData, settingsData, productsData, masterSubTab]);

    useEffect(() => {
        if (settingsData && settingsData.channels) {
            const tg = settingsData.channels.find(c => c.name === 'Telegram' || c.type === 'telegram');
            if (tg) {
                const config = tg.config_json || {};
                setBotToken(config.bot_token || '');
                setBotUsername(config.username || '');
            }
        }
        if (settingsData && settingsData.ai_setting) {
            setOpenAiToken(settingsData.ai_setting.openai_token || '');
            setPersonality(settingsData.ai_setting.personality || '');
            setBriefing(settingsData.ai_setting.briefing || '');
            setKpiLeadTimeAi(settingsData.ai_setting.kpi_lead_time_ai ?? 15);
            setKpiLeadTimeManual(settingsData.ai_setting.kpi_lead_time_manual ?? 300);
        }
    }, [settingsData]);

    const saveKb = () => {
        fetch('/api/knowledge-base', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(kbForm)
        }).then(() => {
            setKbForm({ category: 'Company Profile', title: '', content: '' });
            refetchKb();
        });
    };

    const toggleAi = (val) => {
        fetch('/api/settings/ai-toggle', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                full_control: val, 
                openai_token: openAiToken,
                personality: personality,
                briefing: briefing,
                kpi_lead_time_ai: kpiLeadTimeAi,
                kpi_lead_time_manual: kpiLeadTimeManual
            })
        }).then(() => refetchSettings());
    };

    const saveAiSettings = () => {
        fetch('/api/settings/ai-toggle', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                full_control: settingsData.ai_setting.full_control,
                openai_token: openAiToken,
                personality: personality,
                briefing: briefing,
                kpi_lead_time_ai: kpiLeadTimeAi,
                kpi_lead_time_manual: kpiLeadTimeManual
            })
        })
        .then(res => res.json())
        .then(() => {
            alert('AI Settings saved successfully!');
            refetchSettings();
        })
        .catch(err => {
            console.error(err);
            alert('Failed to save AI Settings.');
        });
    };

    const [testingConnection, setTestingConnection] = useState(false);
    const [testingOpenAi, setTestingOpenAi] = useState(false);
    const [syncingMessages, setSyncingMessages] = useState(false);

    const saveTelegramChannel = () => {
        if (!settingsData) return;
        const tg = settingsData.channels.find(c => c.name === 'Telegram' || c.type === 'telegram');
        if (!tg) return;

        fetch(`/api/settings/channel/${tg.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                status: 'Connected',
                config_json: {
                    bot_token: botToken,
                    username: botUsername
                }
            })
        })
        .then(res => res.json())
        .then(() => {
            alert('Telegram bot configuration saved successfully!');
            refetchSettings();
        })
        .catch(err => {

                setLoadingSummary(false);

        fetch(`/api/conversations/${id}/suggest`)

    const [userForm, setUserForm] = React.useState({ id: null, name: '', email: '', password: '', role_id: '' });
    const [isEditing, setIsEditing] = React.useState(false);
    const [newRoleName, setNewRoleName] = React.useState('');
    const [matrix, setMatrix] = React.useState([]);

    React.useEffect(() => {
        if (roles.length > 0) {
            setMatrix(roles.map(r => ({ id: r.id, name: r.name, permissions: r.permissions || [] })));
        }
    }, [roles]);

    React.useEffect(() => {
        lucide.createIcons();
    }, [roles, users, matrix]);

    const handleCheckboxChange = (roleId, permissionKey) => {
        setMatrix(prev => prev.map(r => {
            if (r.id === roleId) {
                const alreadyHas = r.permissions.includes(permissionKey);
                const newPerms = alreadyHas 
                    ? r.permissions.filter(p => p !== permissionKey)
                    : [...r.permissions, permissionKey];
                return { ...r, permissions: newPerms };
            }
            return r;
        }));
    };

    const saveMatrix = () => {
        fetch('/api/roles/matrix', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ matrix })
        })
        .then(res => res.json())
        .then(data => {
            alert('Access control matrix saved successfully!');
            fetchRoles();
        })
        .catch(err => {
            console.error(err);
            alert('Failed to save matrix.');
        });
    };

    const saveUser = (e) => {
        e.preventDefault();
        const method = isEditing ? 'PUT' : 'POST';
        const url = isEditing ? `/api/users/${userForm.id}` : '/api/users';
        
        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userForm)
        })
        .then(res => {
            if (!res.ok) throw new Error('Request failed');
            return res.json();
        })
        .then(() => {
            setUserForm({ id: null, name: '', email: '', password: '', role_id: '' });
            setIsEditing(false);
            fetchUsers();
            alert(isEditing ? 'User updated successfully!' : 'User created successfully!');
        })
        .catch(() => alert('Failed to save user. Check email uniqueness or input validation.'));
    };

    const editUser = (user) => {
        setUserForm({
            id: user.id,
            name: user.name,
            email: user.email,
            password: '',
            role_id: user.role_id || ''
        });
        setIsEditing(true);
    };

    const deleteUser = (id) => {
        if (!confirm('Are you sure you want to delete this user?')) return;
        fetch(`/api/users/${id}`, {
            method: 'DELETE'
        })
        .then(res => {
            if (!res.ok) {
                return res.json().then(data => { throw new Error(data.message || 'Failed') });
            }
            fetchUsers();
            alert('User deleted successfully!');
        })
        .catch(err => alert(err.message));
    };

    const createRole = (e) => {
        e.preventDefault();
        if (!newRoleName.trim()) return;
        fetch('/api/roles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newRoleName })
        })
        .then(res => res.json())
        .then(() => {
            setNewRoleName('');
            fetchRoles();
            alert('Role created successfully!');
        });
    };

    return (
        <div className="main-content">
            <div className="page-header">User & Role Management</div>
            <div className="settings-container" style={{display: 'flex', flexDirection: 'column', gap: '2rem'}}>
                {/* 1. Access Control Matrix Card */}
                <div className="card">
                    <div className="card-title" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                        <span>Access Control Matrix</span>
                        <button className="btn" style={{padding: '0.4rem 1rem', fontSize: '0.85rem'}} onClick={saveMatrix}>Save Access Matrix</button>
                    </div>
                    <div style={{overflowX: 'auto'}}>
                        <table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left', fontSize: '0.9rem'}}>
                            <thead>
                                <tr style={{borderBottom: '1px solid var(--border-color)', color: 'var(--text-muted)'}}>
                                    <th style={{padding: '0.75rem 1rem'}}>Role Name</th>
                                    <th style={{padding: '0.75rem 1rem', textAlign: 'center'}}>Unified Inbox (`inbox`)</th>
                                    <th style={{padding: '0.75rem 1rem', textAlign: 'center'}}>Settings (`settings`)</th>
                                    <th style={{padding: '0.75rem 1rem', textAlign: 'center'}}>User Management (`users`)</th>
                                </tr>
                            </thead>
                            <tbody>
                                {matrix.map(r => (
                                    <tr key={r.id} style={{borderBottom: '1px solid rgba(255,255,255,0.05)', verticalAlign: 'middle'}}>
                                        <td style={{padding: '0.75rem 1rem', fontWeight: 600, color: 'white'}}>{r.name}</td>
                                        <td style={{padding: '0.75rem 1rem', textAlign: 'center'}}>
                                            <input 
                                                type="checkbox" 
                                                checked={r.permissions.includes('inbox')}
                                                onChange={() => handleCheckboxChange(r.id, 'inbox')}
                                                style={{width: '18px', height: '18px', cursor: 'pointer'}}
                                            />
                                        </td>
                                        <td style={{padding: '0.75rem 1rem', textAlign: 'center'}}>
                                            <input 
                                                type="checkbox" 
                                                checked={r.permissions.includes('settings')}
                                                onChange={() => handleCheckboxChange(r.id, 'settings')}
                                                style={{width: '18px', height: '18px', cursor: 'pointer'}}
                                            />
                                        </td>
                                        <td style={{padding: '0.75rem 1rem', textAlign: 'center'}}>
                                            <input 
                                                type="checkbox" 
                                                checked={r.permissions.includes('users')}
                                                onChange={() => handleCheckboxChange(r.id, 'users')}
                                                style={{width: '18px', height: '18px', cursor: 'pointer'}}
                                            />
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    
                    {/* Add Role Mini-form */}
                    <form onSubmit={createRole} style={{display: 'flex', gap: '1rem', marginTop: '1.5rem', alignItems: 'center', borderTop: '1px dashed var(--border-color)', paddingTop: '1.25rem'}}>
                        <input 
                            type="text" 
                            className="form-control" 
                            style={{maxWidth: '250px', padding: '0.5rem'}} 
                            placeholder="New Role Name (e.g. Supervisor)" 
                            value={newRoleName}
                            onChange={e => setNewRoleName(e.target.value)}
                        />
                        <button type="submit" className="btn" style={{padding: '0.5rem 1.25rem'}}>Add Role</button>
                    </form>
                </div>

                {/* 2. Users Management Grid */}
                <div style={{display: 'grid', gridTemplateColumns: '1.8fr 1.2fr', gap: '1.5rem'}}>
                    {/* Users List */}
                    <div className="card">
                        <div className="card-title">Users List</div>
                        <div style={{overflowX: 'auto'}}>
                            <table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left', fontSize: '0.875rem'}}>
                                <thead>
                                    <tr style={{borderBottom: '1px solid var(--border-color)', color: 'var(--text-muted)'}}>
                                        <th style={{padding: '0.5rem'}}>Name</th>
                                        <th style={{padding: '0.5rem'}}>Email</th>
                                        <th style={{padding: '0.5rem'}}>Role</th>
                                        <th style={{padding: '0.5rem', textAlign: 'right'}}>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {users.map(u => (
                                        <tr key={u.id} style={{borderBottom: '1px solid rgba(255,255,255,0.05)'}}>
                                            <td style={{padding: '0.75rem 0.5rem', color: 'white', fontWeight: 500}}>{u.name}</td>
                                            <td style={{padding: '0.75rem 0.5rem', color: 'var(--text-muted)'}}>{u.email}</td>
                                            <td style={{padding: '0.75rem 0.5rem'}}>
                                                <span style={{background: 'rgba(255,255,255,0.1)', padding: '2px 8px', borderRadius: '4px', fontSize: '0.75rem'}}>
                                                    {u.role ? u.role.name : 'No Role'}
                                                </span>
                                            </td>
                                            <td style={{padding: '0.75rem 0.5rem', textAlign: 'right', display: 'flex', gap: '0.5rem', justifyContent: 'flex-end'}}>
                                                <button onClick={() => editUser(u)} style={{background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: '0.8rem'}}>Edit</button>
                                                <button onClick={() => deleteUser(u.id)} style={{background: 'none', border: 'none', color: 'var(--danger)', cursor: 'pointer', fontSize: '0.8rem'}}>Delete</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* User Form */}
                    <div className="card">
                        <div className="card-title">{isEditing ? 'Edit User' : 'Create New User'}</div>
                        <form onSubmit={saveUser} style={{display: 'flex', flexDirection: 'column', gap: '1rem'}}>
                            <div className="form-group" style={{marginBottom: '0px'}}>
                                <label>Full Name</label>
                                <input type="text" className="form-control" style={{padding: '0.5rem'}} required value={userForm.name} onChange={e => setUserForm({...userForm, name: e.target.value})} />
                            </div>
                            <div className="form-group" style={{marginBottom: '0px'}}>
                                <label>Email Address</label>
                                <input type="email" className="form-control" style={{padding: '0.5rem'}} required value={userForm.email} onChange={e => setUserForm({...userForm, email: e.target.value})} />
                            </div>
                            <div className="form-group" style={{marginBottom: '0px'}}>
                                <label>Password {isEditing && <span style={{fontSize: '0.75rem', color: 'var(--text-muted)'}}>(leave blank to keep current)</span>}</label>
                                <input type="password" className="form-control" style={{padding: '0.5rem'}} required={!isEditing} value={userForm.password} onChange={e => setUserForm({...userForm, password: e.target.value})} />
                            </div>
                            <div className="form-group" style={{marginBottom: '0px'}}>
                                <label>Role</label>
                                <select className="form-control" style={{padding: '0.5rem'}} required value={userForm.role_id} onChange={e => setUserForm({...userForm, role_id: e.target.value})}>
                                    <option value="">Select Role</option>
                                    {roles.map(r => (
                                        <option key={r.id} value={r.id}>{r.name}</option>
                                    ))}
                                </select>
                            </div>
                            <div style={{display: 'flex', gap: '0.5rem', marginTop: '0.5rem'}}>
                                <button type="submit" className="btn" style={{flex: 1}}>{isEditing ? 'Save Changes' : 'Create User'}</button>
                                {isEditing && (
                                    <button type="button" className="btn" style={{background: 'rgba(255,255,255,0.1)', color: 'white'}} onClick={() => {
                                        setUserForm({ id: null, name: '', email: '', password: '', role_id: '' });
                                        setIsEditing(false);
                                    }}>Cancel</button>
                                )}
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    );
};

        const App = () => {
            const getInitialView = () => {
                if (window.location.pathname.includes('/settings')) return 'settings';
                if (window.location.pathname.includes('/users')) return 'users';
                if (window.location.pathname.includes('/overview')) return 'overview';
                return 'overview';
            };
            const [view, setView] = useState(getInitialView());
            const [activeRole, setActiveRole] = useState('');
            const [roles, setRoles] = useState([]);
            const [users, setUsers] = useState([]);
            const [loadingRoles, setLoadingRoles] = useState(true);
            const [loadingUsers, setLoadingUsers] = useState(true);

            const fetchRoles = () => {
                setLoadingRoles(true);
                fetch('/api/roles')
                    .then(res => res.json())
                    .then(data => {
                        setRoles(data);
                        setLoadingRoles(false);
                    })
                    .catch(() => setLoadingRoles(false));
            };

            const fetchUsers = () => {
                setLoadingUsers(true);
                fetch('/api/users')
                    .then(res => res.json())
                    .then(data => {
                        setUsers(data);
                        setLoadingUsers(false);
                    })
                    .catch(() => setLoadingUsers(false));
            };

            useEffect(() => {
                fetchRoles();
                fetchUsers();

                const handlePopState = () => {
                    setView(getInitialView());
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                if (roles.length > 0 && !activeRole) {
                    const superAdmin = roles.find(r => r.name === 'Super Admin');
                    setActiveRole(superAdmin ? superAdmin.id : roles[0].id);
                }
            }, [roles]);

            const currentRoleObj = roles.find(r => r.id == activeRole);
            const userPermissions = currentRoleObj ? (currentRoleObj.permissions || []) : [];

            useEffect(() => {
                if (roles.length > 0 && activeRole) {
                    if (view === 'settings' && !userPermissions.includes('settings')) {
                        navigateTo('chat', '/dashboard/inbox');
                    }
                    if (view === 'users' && !userPermissions.includes('users')) {
                        navigateTo('chat', '/dashboard/inbox');
                    }
                }
            }, [view, activeRole, roles]);

            useEffect(() => {
                lucide.createIcons();
            }, [view, activeRole, roles, users]);

            const navigateTo = (newView, url) => {
                window.history.pushState({}, '', url);
                setView(newView);
            };

            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="logo">
                            <i data-lucide="message-square" style={{width: 24, height: 24}}></i>
                            GMA
                        </div>
                        
                        <div style={{padding: '1rem', marginBottom: '1rem', borderBottom: '1px solid rgba(255,255,255,0.05)'}}>
                            <div style={{fontSize: '0.75rem', color: 'var(--text-muted)', marginBottom: '0.5rem'}}>ACTIVE ROLE</div>
                            <select 
                                className="form-control" 
                                value={activeRole} 
                                onChange={e => {
                                    setActiveRole(e.target.value);
                                }}
                                style={{padding: '0.5rem', fontSize: '0.875rem'}}
                            >
                                {roles.map(r => (
                                    <option key={r.id} value={r.id}>{r.name}</option>
                                ))}
                            </select>
                        </div>

                        {userPermissions.includes('inbox') && (
                            <>
                                <div className={`nav-item ${view === 'overview' ? 'active' : ''}`} onClick={() => navigateTo('overview', '/dashboard/overview')}>
                                    <i data-lucide="layout-dashboard" style={{width: 20, height: 20}}></i>
                                    Dashboard Overview
                                </div>
                                <div className={`nav-item ${view === 'chat' ? 'active' : ''}`} onClick={() => navigateTo('chat', '/dashboard/inbox')}>
                                    <i data-lucide="inbox" style={{width: 20, height: 20}}></i>
                                    Unified Inbox
                                </div>
                            </>
                        )}
                        {userPermissions.includes('settings') && (
                            <div className={`nav-item ${view === 'settings' ? 'active' : ''}`} onClick={() => navigateTo('settings', '/dashboard/settings')}>
                                <i data-lucide="settings" style={{width: 20, height: 20}}></i>
                                Settings & Master Data
                            </div>
                        )}
                        {userPermissions.includes('users') && (
                            <div className={`nav-item ${view === 'users' ? 'active' : ''}`} onClick={() => navigateTo('users', '/dashboard/users')}>
                                <i data-lucide="users" style={{width: 20, height: 20}}></i>
                                User & Role Management
                            </div>
                        )}
                        
                        <div style={{ marginTop: 'auto', paddingTop: '2rem' }}>
                            <form method="POST" action="/logout">
                                <input type="hidden" name="_token" value="ze3tIoY0qzShRPRF9sXzHtXROPa2mmLA80Vnjbrl" />
                                <button type="submit" className="nav-item" style={{background: 'transparent', border: 'none', width: '100%', textAlign: 'left', color: 'var(--text-muted)', cursor: 'pointer', fontFamily: 'inherit'}}>
                                    <i data-lucide="log-out" style={{width: 20, height: 20}}></i>
                                    Logout
                                </button>
                            </form>
                        </div>
                    </div>
                    {view === 'overview' && <OverviewView />}
                    {view === 'chat' && <ChatView />}
                    {view === 'settings' && <SettingsView />}
                    {view === 'users' && <UserRoleView roles={roles} fetchRoles={fetchRoles} users={users} fetchUsers={fetchUsers} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
